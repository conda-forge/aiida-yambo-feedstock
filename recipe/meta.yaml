{% set name = "aiida-yambo" %}
{% set version = "1.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aiida-yambo-{{ version }}.tar.gz
  sha256: 3f25b460bb2f1c5ceee1da35da62465208e44a0c7a6df79a7c62feb61672bb58

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - aiida-core.atomic_tools >=1.0.0a2
    - aiida-quantumespresso >=3.0.0a6,<4.0
    - h5py
    - netcdf4
    - pytest
    - python >={{ python_min }}

test:
  imports:
    - aiida_yambo
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/yambo-code/yambo-aiida
  summary: YAMBO plugin and workflows for AiiDA
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - mbercx
    - chrisjsewell
